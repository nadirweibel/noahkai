<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Wish – Noah Kai</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
  }

  #video-container {
    position: relative;
    width: 100vmin;
    height: 100vmin;
    max-width: 800px;
    max-height: 800px;
  }

  #cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Vignette overlay */
  #vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
  }

  /* Bottom gradient for lyrics readability */
  #bottom-fade {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 45%;
    background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
    pointer-events: none;
  }

  #lyrics-area {
    position: absolute;
    bottom: 80px;
    left: 0; right: 0;
    text-align: center;
    padding: 0 30px;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
  }

  .lyric-line {
    color: #fff;
    font-size: clamp(14px, 3.5vmin, 22px);
    font-weight: 400;
    letter-spacing: 0.04em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.7);
    line-height: 1.4;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    font-style: italic;
  }

  .lyric-line.active {
    opacity: 1;
    transform: translateY(0);
  }

  .lyric-line.prev {
    opacity: 0.35;
    transform: translateY(0);
    font-size: clamp(12px, 2.8vmin, 17px);
  }

  /* Controls */
  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 70px;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
  }

  #play-btn {
    background: none;
    border: 2px solid rgba(255,255,255,0.7);
    color: #fff;
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.2s, background 0.2s;
  }
  #play-btn:hover { background: rgba(255,255,255,0.15); border-color: #fff; }

  #progress-container {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }

  #progress-bar {
    height: 100%;
    background: rgba(255,255,255,0.85);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
    pointer-events: none;
  }

  #time-display {
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    font-family: monospace;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }

  /* Song info */
  #song-info {
    position: absolute;
    top: 20px;
    left: 20px;
  }
  #song-title {
    color: #fff;
    font-size: clamp(13px, 3vmin, 18px);
    font-style: italic;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    letter-spacing: 0.12em;
  }
  #song-artist {
    color: rgba(255,255,255,0.65);
    font-size: clamp(10px, 2vmin, 13px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 3px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
</style>
</head>

const playBtn = document.getElementById('play-btn');
const progressBar = document.getElementById('progress-bar');
const timeDisplay = document.getElementById('time-display');
const currLine = document.getElementById('curr-line');
const prevLine = document.getElementById('prev-line');

const lyrics = [[0, ""], [14.0, "Why do I always feel like you are staring at me?"], [21, "I mean, I don't know, but honestly"], [25.0, "I wish that I could be more like you."], [31.0, "Why can't I see that everybody deals with things,"], [35, "and how popularity is just based"], [39.0, "on how well you hide your anxiety"], [46.0, "and your insecurities?"],[49.5, "Oh baby I, I wish I didn't care,"], [59, "I wish I had fluffier hair,"], [63.0, "I wish I had a lower voice,"], [67.0, "I wish, I wish I had the choice."], [71, ""], [72.0, "I wish I could stand here"], [75.5, "without holding back tears,"], [79.5, "I wish, I wish I wasn't weird,"], [83.0, "I wish, I wish I'd grow a beard."], [87, ""],[89.0, "Why am I always staring at you?"], [94.5, "I don't care what I think,"], [97.5, "just what you do,"], [99.0, "if I could I would do"], [103, ""],[105.0, "anything to change everything"], [110.0, "that is wrong with me."], [114.5, "Oh baby I, I wish I didn't care,"], [123, "I wish I had fluffier hair,"], [127.5, "I wish I had a lower voice,"], [131.0, "I wish, I wish I had the choice."],[134.5, ""], [136.5, "I wish I could stand here"], [139.5, "without holding back tears,"], [143.0, "I wish, I wish I wasn't weird,"], [147.0, "I wish, I wish I'd grow a beard."],[151, ""], [153.0, "Why, oh why do I cry all night about you,"], [164.0, "I hate you, oh baby I,"], [171.0, "I wish I didn't care,"], [174.0, "I wish I had fluffier hair,"], [178.0, "I wish I had a lower voice,"], [182.0, "I wish, I wish I had the choice."],[185.5, ""], [187.5, "I wish I could stand here"], [190.0, "without holding back tears,"], [194.0, "I wish, I wish I wasn't weird,"], [198.0, "I wish, I wish I'd grow a beard."], [202, ""],[206.0, "I wish I didn't care\u2026"], [209.0, "\u2026fluffier hair"], [213, ""],[219.5, "I wish I didn't care\u2026"], [222.0, "but you know that I do"], [232.0, ""], [232.0, ""], [234.0, ""]];

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function togglePlay() {
  if (audio.paused) {
    audio.play();
    playBtn.innerHTML = '&#9646;&#9646;';
  } else {
    audio.pause();
    playBtn.innerHTML = '&#9654;';
  }
}

function seek(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  audio.currentTime = ratio * audio.duration;
}

let lastIdx = -1;

audio.addEventListener('timeupdate', () => {
  const t = audio.currentTime;
  const dur = audio.duration || 0;
  
  // Progress
  progressBar.style.width = (dur ? (t / dur * 100) : 0) + '%';
  timeDisplay.textContent = formatTime(t) + ' / ' + formatTime(dur);

  // Find current lyric
  let idx = -1;
  for (let i = 0; i < lyrics.length - 1; i++) {
    if (t >= lyrics[i][0] && t < lyrics[i+1][0]) {
      idx = i;
      break;
    }
  }
  
  if (idx !== lastIdx) {
    lastIdx = idx;
    const line = idx >= 0 ? lyrics[idx][1] : '';
    const prevIdx = idx - 1;
    const prev = (prevIdx >= 0 && lyrics[prevIdx][1]) ? lyrics[prevIdx][1] : '';
    
    currLine.textContent = line;
    prevLine.textContent = prev;
    
    // Animate
    currLine.classList.remove('active');
    void currLine.offsetWidth;
    currLine.classList.add('active');
  }
});

audio.addEventListener('ended', () => {
  playBtn.innerHTML = '&#9654;';
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault(); // stops the page from scrolling
    togglePlay();
  }
});
</script>
</body>
</html>

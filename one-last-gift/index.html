const audio=document.getElementById("audio");
const playBtn=document.getElementById("playBtn");
const seek=document.getElementById("seek");
const time=document.getElementById("time");
const lyricBox=document.getElementById("lyrics");

function formatTime(t){
  const m=Math.floor(t/60);
  const s=Math.floor(t%60).toString().padStart(2,"0");
  return m+":"+s;
}

function togglePlay(){
  if(audio.paused){
    audio.play();
    playBtn.innerText="❚❚";
  }else{
    audio.pause();
    playBtn.innerText="▶";
  }
}

playBtn.onclick=(e)=>{
  e.stopPropagation();
  togglePlay();
};

document.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    e.preventDefault();
    togglePlay();
  }
});

document.getElementById("player").onclick=e=>{
  if(!e.target.closest("#playBtn") && e.target.id!=="seek"){
    togglePlay();
  }
};

audio.addEventListener("timeupdate",()=>{
  seek.value=(audio.currentTime/audio.duration)*100||0;
  time.innerText=formatTime(audio.currentTime);

  let idx=-1;
  for(let i=0;i<lyrics.length;i++){
    const start=lyrics[i][0];
    const end=i<lyrics.length-1?lyrics[i+1][0]:Infinity;
    if(audio.currentTime>=start && audio.currentTime<end){
      idx=i;
      break;
    }
  }

  if(idx>=0){
    lyricBox.innerText=lyrics[idx][1];
  } else {
    lyricBox.innerText="";
  }
});

seek.addEventListener("input",()=>{
  audio.currentTime=(seek.value/100)*audio.duration;
});

audio.addEventListener("ended",()=>{
  playBtn.innerText="▶";
});
</script>
